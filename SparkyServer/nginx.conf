worker_processes auto;

events {
    worker_connections 2048;
}

stream {
    # Upstream pointing to the internal SparkyServer container
    upstream sparky_backend {
        server sparky-server:7777 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 7777;
        proxy_pass sparky_backend;
        
        # Robust TCP connection timeouts (prevent early drops on slow cellular networks)
        proxy_timeout 1h;
        proxy_connect_timeout 5s;
    }
}
