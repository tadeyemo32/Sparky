name: Sparky CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
# ... (rest of the file)
  # ── Module 1: Loader Build & Tests (Windows) ──────────────────────────
  loader-build-and-tests:
    name: Loader Build & Tests
    runs-on: windows-latest
    outputs:
      loader_sha256: ${{ steps.hash.outputs.loader_sha256 }}
    steps:
      - name: Checkout Code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: C:\Program Files\OpenSSL
          key: openssl-win64-3.6.1

      - name: Install OpenSSL via Chocolatey
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: choco install openssl -y --no-progress

      - name: Locate OpenSSL root
        run: |
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL",
            "C:\OpenSSL-Win64",
            "C:\OpenSSL-Win32"
          )
          foreach ($p in $candidates) {
            if (Test-Path "$p\include\openssl\ssl.h") {
              "OPENSSL_ROOT_DIR=$p" | Out-File -FilePath $env:GITHUB_ENV -Append
              Write-Host "OpenSSL found at $p"
              exit 0
            }
          }
          Write-Error "OpenSSL not found in any expected location"
          exit 1

      - name: Configure CMake (Release)
        run: |
          cd SparkyLoader/user
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR"

      - name: Build SparkyLoader
        run: |
          cd SparkyLoader/user
          cmake --build build --config Release --target SparkyLoader -j 2

      - name: Build & Run Unit Tests
        run: |
          cd SparkyLoader/user
          cmake --build build --config Release --target SparkyTests -j 2
          if (Test-Path "bin/Release/SparkyTests.exe") { ./bin/Release/SparkyTests.exe } else { Write-Host "No test binary found, skipping." }

      - name: Compute SHA-256 of SparkyLoader.exe
        id: hash
        run: |
          $hash = (Get-FileHash "SparkyLoader/user/bin/Release/SparkyLoader.exe" -Algorithm SHA256).Hash.ToLower()
          Write-Host "Loader SHA-256: $hash"
          "loader_sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload SparkyLoader.exe Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SparkyLoader
          path: SparkyLoader/user/bin/Release/SparkyLoader.exe
          if-no-files-found: warn

  # ── Module 1b: Site Build & Tests ─────────────────────────────────────
  site-build-and-tests:
    name: Site Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SparkySite
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SparkySite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

  # ── Module 2: Server Build & Tests (Linux) ────────────────────────────
  server-build-and-tests:
    name: Server Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Runtime Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpq-dev cmake

      - name: Build Server Binary & Tests
        run: |
          cd SparkyServer
          mkdir -p build
          cd build
          cmake ..
          make -j2 SparkyServer
          make -j2 SparkyTests

      - name: Execute Test Suite
        run: |
          cd SparkyServer/bin
          ./SparkyTests

  # ── Module 2b: Spxarky TF2 Core Tests (Windows) ──────────────────────
  spxarky-tests:
    name: Spxarky Build & Tests
    needs: [loader-build-and-tests, site-build-and-tests, server-build-and-tests]
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Tests
        working-directory: SparkyCore/tf2/Spxarky/test
        run: cmake -B build -S .

      - name: Build Tests
        working-directory: SparkyCore/tf2/Spxarky/test
        run: cmake --build build --config Release

      - name: Run Tests
        working-directory: SparkyCore/tf2/Spxarky/test
        run: ctest --test-dir build -C Release --output-on-failure

  # ── Module 2c: Spxarky TF2 Core Build (Windows) ──────────────────────
  spxarky-build:
    name: Spxarky Build (${{ matrix.platform }} ${{ matrix.configuration }})
    needs: [spxarky-tests]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release, ReleaseAVX2, ReleaseFreetype, ReleaseFreetypeAVX2]
        platform: [x64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore SparkyCore/tf2/Spxarky/Spxarky.sln

      - name: Build FreeType static lib (Freetype configurations only)
        if: contains(matrix.configuration, 'Freetype')
        shell: pwsh
        run: |
          # Clone FreeType source (shallow)
          git clone --depth 1 --branch VER-2-13-3 https://github.com/freetype/freetype.git freetype_src
          # Build standalone — disable all external deps so the .lib has no transitive requirements
          cmake -S freetype_src -B freetype_src/build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DFT_DISABLE_ZLIB=ON `
            -DFT_DISABLE_BZIP2=ON `
            -DFT_DISABLE_PNG=ON `
            -DFT_DISABLE_HARFBUZZ=ON `
            -DFT_DISABLE_BROTLI=ON `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL
          cmake --build freetype_src/build --config Release
          # Locate and copy the built lib
          $built = Get-ChildItem -Recurse -Filter "freetype.lib" freetype_src/build | Select-Object -First 1 -ExpandProperty FullName
          if (-not $built) { Write-Error "freetype.lib not found after build"; exit 1 }
          Copy-Item $built "SparkyCore\tf2\Spxarky\Spxarky\include\freetype\freetype.lib"
          Write-Host "freetype.lib built and copied from $built"

      - name: Build
        run: |
          msbuild SparkyCore/tf2/Spxarky/Spxarky.sln `
            /p:Platform=${{ matrix.platform }} `
            /p:Configuration=${{ matrix.configuration }} `
            /p:SolutionDir="${{ github.workspace }}\SparkyCore\tf2\Spxarky\" `
            /m

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spxarkytf2${{ matrix.platform }}${{ matrix.configuration }}
          path: SparkyCore/tf2/Spxarky/output/${{ matrix.platform }}/${{ matrix.configuration }}/*.dll
          if-no-files-found: warn

      - name: Upload PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spxarkytf2${{ matrix.platform }}${{ matrix.configuration }}PDB
          path: SparkyCore/tf2/Spxarky/output/${{ matrix.platform }}/${{ matrix.configuration }}/*.pdb
          if-no-files-found: warn

  # ── Module 3: Production Deployment (gated by Module 1 & 2) ───────────
  deploy:
    name: Production Deployment
    needs: [loader-build-and-tests, server-build-and-tests, spxarky-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REGION: europe-west1
      SERVICE_NAME: sparky-server
      REPO_NAME: sparky-repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve project ID and image path
        run: |
          RAW_PROJECT=$(gcloud config get-value project | tr -d '[:space:]')
          LOWERCASE_PROJECT=$(echo "$RAW_PROJECT" | tr '[:upper:]' '[:lower:]')
          echo "PROJECT_ID=$LOWERCASE_PROJECT" >> $GITHUB_ENV
          echo "IMAGE=${REGION}-docker.pkg.dev/$LOWERCASE_PROJECT/$REPO_NAME/sparky-server" >> $GITHUB_ENV

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (idempotent)
        run: |
          gcloud artifacts repositories create ${{ env.REPO_NAME }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Repository already exists, skipping."

      - name: Inject SSL certificate and key
        run: |
          if [ -n "${{ secrets.SPARKY_CERT_PEM }}" ]; then
            echo "${{ secrets.SPARKY_CERT_PEM }}" > SparkyServer/sparky.crt
            echo "${{ secrets.SPARKY_PRIVATE_KEY }}" > SparkyServer/sparky.key
          else
            touch SparkyServer/sparky.crt SparkyServer/sparky.key
          fi

      - name: Build and push Docker image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -f SparkyServer/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Ensure Cloud Storage bucket exists
        run: |
          if ! gcloud storage buckets describe "gs://${{ secrets.GCP_BUCKET_NAME }}" >/dev/null 2>&1; then
            gcloud storage buckets create "gs://${{ secrets.GCP_BUCKET_NAME }}" --location=${{ env.REGION }}
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --execution-environment gen2 \
            --add-volume=name=sparky-data,type=cloud-storage,bucket=${{ secrets.GCP_BUCKET_NAME }} \
            --add-volume-mount=volume=sparky-data,mount-path=/app/data \
            --add-volume=name=sparky-payloads,type=cloud-storage,bucket=sparky-payloads-490704 \
            --add-volume-mount=volume=sparky-payloads,mount-path=/app/payloads \
            --set-env-vars SPARKY_NO_TLS="1",SPARKY_KEY="${{ secrets.SPARKY_KEY }}",SPARKY_PG_CONNSTR="${{ secrets.SPARKY_PG_CONNSTR }}",SPARKY_HWID_PEPPER="${{ secrets.SPARKY_HWID_PEPPER }}",SPARKY_ALLOWED_ORIGIN="${{ secrets.SPARKY_ALLOWED_ORIGIN }}",SPARKY_WEB_OWNER_USERNAME="${{ secrets.SPARKY_WEB_OWNER_USERNAME }}",RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}",RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}",SPARKY_PROXY_SECRET="${{ secrets.SPARKY_PROXY_SECRET }}",SPARKY_ATTEST_KEY="${{ secrets.SPARKY_ATTEST_KEY }}" \
            --quiet

      - name: Bind public invoker IAM policy
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --member=allUsers \
            --role=roles/run.invoker \
            --quiet || echo "IAM binding skipped — set manually in GCP Console if needed."

      - name: Download ReleaseAVX2 DLL for payload bucket
        uses: actions/download-artifact@v4
        with:
          name: Spxarkytf2x64ReleaseAVX2
          path: payload-upload/

      - name: Upload core DLL to GCP payload bucket
        run: |
          DLL=$(find payload-upload -name "*.dll" | head -1)
          if [ -z "$DLL" ]; then
            echo "No DLL found in payload-upload/, skipping"
            exit 0
          fi
          gcloud storage cp "$DLL" "gs://sparky-payloads-490704/Spxarkytf2x64ReleaseAVX2.dll"
          echo "Uploaded $DLL → gs://sparky-payloads-490704/Spxarkytf2x64ReleaseAVX2.dll"

      - name: Register loader hash in trusted_hashes
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          LOADER_HASH="${{ needs.loader-build-and-tests.outputs.loader_sha256 }}"
          NOTE="ci-build-${{ github.sha }}"
          ADDED_AT=$(date -u +%s)
          psql "${{ secrets.SPARKY_PG_CONNSTR }}" -c \
            "INSERT INTO trusted_hashes(hash, note, added_at)
             VALUES ('$LOADER_HASH', '$NOTE', $ADDED_AT)
             ON CONFLICT(hash) DO UPDATE SET note = EXCLUDED.note, added_at = EXCLUDED.added_at;"

  # ── Module 4: Publish Release with all artifacts ──────────────────────
  # Gated on deploy AND spxarky-build so loader, server, and core DLLs
  # are always in sync. A failed build will not publish a new release.
  release:
    name: Publish Release
    needs: [deploy, spxarky-build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Loader Artifact
        uses: actions/download-artifact@v4
        with:
          name: SparkyLoader
          path: release-assets/

      - name: Download Spxarky DLL artifacts
        run: |
          for cfg in Release ReleaseAVX2 ReleaseFreetype ReleaseFreetypeAVX2; do
            mkdir -p "release-assets"
            gh run download ${{ github.run_id }} \
              --name "Spxarkytf2x64${cfg}" \
              --dir "release-assets" || echo "Artifact Spxarkytf2x64${cfg} not found, skipping"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release assets
        run: ls -la release-assets/

      - name: Build release body
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          {
            echo "RELEASE_BODY<<EOF"
            echo "**Commit:** \`$GITHUB_SHA\`"
            echo "**Branch:** \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "### Assets"
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`SparkyLoader.exe\` | Loader (authenticates and injects the core DLL) |"
            echo "| \`Spxarky*.dll\` | Core DLL — pick the variant matching your CPU/preference |"
            echo "| \`*AVX2*\` | AVX2-optimized build (modern CPUs) |"
            echo "| \`*Freetype*\` | FreeType font rendering (custom fonts in menu) |"
            echo ""
            echo "### Recent changes"
            git log --oneline -5 --no-walk=unsorted HEAD | sed 's/^/- /'
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Latest Build ({0})', env.SHORT_SHA) }}
          prerelease: false
          make_latest: true
          body: ${{ env.RELEASE_BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
